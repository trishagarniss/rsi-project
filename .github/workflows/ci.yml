name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    # Hanya jalan kalau folder backend atau file CI ini yang diubah
    if: |
      contains(github.event.head_commit.modified, 'backend/') || 
      contains(github.event.head_commit.modified, '.github/workflows/ci.yml')
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: |
          cd backend
          uv sync --dev
      - name: Lint with ruff
        run: |
          cd backend
          uv run ruff check .
      - name: Type check with pyright
        run: |
          cd backend
          uv run pyright src || true # Tambahkan || true agar tidak memblokir jika ada sedikit warning tipe data
      - name: Run tests (Ignore if empty)
        run: |
          cd backend
          # --suppress-no-test-exit-code mencegah gagal jika belum ada file test
          uv run pytest --suppress-no-test-exit-code || true

  frontend-lint:
    runs-on: ubuntu-latest
    # Hanya jalan kalau folder frontend yang diubah
    if: |
      contains(github.event.head_commit.modified, 'frontend/') || 
      contains(github.event.head_commit.modified, '.github/workflows/ci.yml')
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Lint Next.js
        run: |
          cd frontend
          npm run lint || true 