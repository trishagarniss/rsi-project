services:
  postgres:
    image: postgres:15-alpine
    container_name: asgard_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asgard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asgard123}
      POSTGRES_DB: ${POSTGRES_DB:-asgard}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - asgard_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: asgard_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - asgard_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: asgard_backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"
    networks:
      - asgard_network
    command: uvicorn src.backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: asgard_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://100.126.164.53
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - asgard_network
    command: npm run dev

  nginx:
    image: nginx:alpine
    container_name: asgard_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
      - "443:443"
    networks:
      - asgard_network

networks:
  asgard_network:
    driver: bridge

volumes:
  redis_data:
  backend_venv: