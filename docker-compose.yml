services:
  db:
    image: postgres:15-alpine
    container_name: asgard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: asgard
      POSTGRES_PASSWORD: asgard
      POSTGRES_DB: asgard_db
    ports:
      - "5432:5432"
    volumes:
      - asgard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asgard -d asgard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  asgard_pgdata:
