version: '3.8'

# Development override - for hot reload and debugging
services:
  backend:
    command: uvicorn src.backend.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    environment:
      - DEBUG=true

  frontend:
    command: npm run dev
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"